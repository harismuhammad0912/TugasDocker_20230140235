<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Home - Data Mahasiswa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4 bg-light">
<div class="container bg-white p-4 shadow-sm">
    <h5 class="fw-bold">MY Website 20230140235</h5>
    <p class="text-muted" style="font-size: 14px;">Selamat datang di aplikasi!</p>

    <a href="/form" class="text-decoration-none text-primary" style="font-size: 14px;">+ Input Data Mahasiswa</a>

    <br><br>

    <h6 class="fw-bold">Data Mahasiswa</h6>
    <table class="table table-bordered text-center align-middle">
        <thead>
        <tr style="background-color: #007bff; color: white;">
            <th>No</th>
            <th>Nama</th>
            <th>NIM</th>
            <th>Jenis Kelamin</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${mahasiswaList.empty}">
            <td colspan="4" class="text-center text-muted" style="font-size: 14px;">Belum ada data</td>
        </tr>
        <tr th:each="mhs, iterStat : ${mahasiswaList}">
            <td th:text="${iterStat.count}">1</td>
            <td th:text="${mhs.nama}">Nama Mahasiswa</td>
            <td th:text="${mhs.nim}">NIM Mahasiswa</td>
            <td th:text="${mhs.jenisKelamin}">Laki-laki/Perempuan</td>
        </tr>
        </tbody>
    </table>

    <a href="/login" class="text-decoration-none text-primary" style="font-size: 14px;">Logout</a>
</div>
</body>
</html>
